apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hackathon-starter.fullname" . }}
  labels:
    {{- include "hackathon-starter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hackathon-starter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hackathon-starter.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
