name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-backend.yml"
      - "k8s/helm/**"
      - "k8s/values-backend.yaml"
      - "services/hackathon-starter-backend/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-backend-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'app' }}
  HELM_RELEASE_NAME: backend
  IMAGE_REPOSITORY: ${{ secrets.DOCKERHUB_USERNAME }}/hackathon-starter-backend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: ./services/hackathon-starter-backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./services/hackathon-starter-backend
        env:
          HUSKY: 0

      - name: Run lint check
        run: npm run lint-check
        working-directory: ./services/hackathon-starter-backend

      - name: Run tests
        run: npm run test
        working-directory: ./services/hackathon-starter-backend

      - name: Install sops
        uses: nhedger/setup-sops@v2

      - name: Install age
        uses: alessiodionisi/setup-age-action@v1.4.0

      - name: Decrypt backend env file
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          sops decrypt \
            --input-type dotenv \
            --output-type dotenv \
            services/hackathon-starter-backend/.env.example.enc \
            > services/hackathon-starter-backend/.env.example

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./services/hackathon-starter-backend
          file: ./services/hackathon-starter-backend/Dockerfile
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REPOSITORY }}:latest
          no-cache: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # - name: Run Trivy scan
      #   uses: aquasecurity/trivy-action@0.35.0
      #   with:
      #     image-ref: ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
      #     format: table
